<!DOCTYPE html>
<html>
<head><title>MCP Debug</title></head>
<body>
<h2>MCP Connection Debug</h2>
<button onclick="testMcp()">Test MCP</button>
<pre id="log"></pre>
<script>
const log = document.getElementById('log');
function addLog(msg) { log.textContent += msg + '\n'; }

async function testMcp() {
  log.textContent = '';
  const url = 'https://search-mcp.qdp.qzz.io/mcp';
  
  addLog('Test 1: Simple GET...');
  try {
    const r = await fetch(url, { method: 'GET', headers: { 'Accept': 'text/event-stream' } });
    addLog(`GET: ${r.status} ${r.statusText}`);
    addLog(`Headers: ${JSON.stringify(Object.fromEntries(r.headers))}`);
  } catch(e) {
    addLog(`GET FAILED: ${e.message}`);
  }
  
  addLog('\nTest 2: OPTIONS preflight...');
  try {
    const r = await fetch(url, { method: 'OPTIONS', headers: { 
      'Origin': location.origin,
      'Access-Control-Request-Method': 'POST',
      'Access-Control-Request-Headers': 'Content-Type,Accept'
    }});
    addLog(`OPTIONS: ${r.status}`);
  } catch(e) {
    addLog(`OPTIONS FAILED: ${e.message}`);
  }
  
  addLog('\nTest 3: POST initialize...');
  try {
    const r = await fetch(url, { 
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json, text/event-stream' },
      body: JSON.stringify({jsonrpc:"2.0",id:1,method:"initialize",params:{protocolVersion:"2025-03-26",capabilities:{},clientInfo:{name:"test",version:"1.0"}}})
    });
    addLog(`POST: ${r.status} ${r.statusText}`);
    const text = await r.text();
    addLog(`Body: ${text.substring(0, 500)}`);
  } catch(e) {
    addLog(`POST FAILED: ${e.name}: ${e.message}`);
    addLog(`Stack: ${e.stack?.substring(0, 300)}`);
  }
}
</script>
</body>
</html>
